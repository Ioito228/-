<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход | Ростелеком</title>
    <link rel="stylesheet" href="/css/style.css"> <!-- Добавили / -->
</head>
<body>
    <div class="card">
        <div class="rtk-logo">Ростелеком</div>
        <form id="loginForm">
            <input type="text" name="username" placeholder="Логин" required>
            <input type="password" name="password" placeholder="Пароль" required>
            <button type="submit" class="btn">Войти</button>
        </form>
        <p style="margin-top:15px;"><a href="/register.html">Создать профиль</a></p>
    </div>
    <script>
        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            const res = await fetch('/api/login', { method: 'POST', body: new FormData(e.target) });
            if (res.ok) {
                localStorage.setItem('user', JSON.stringify(await res.json()));
                window.location.href = '/index.html';
            } else { alert("Неверный логин или пароль"); }
        };
    </script>
</body>
</html>
